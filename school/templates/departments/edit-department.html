{% extends 'Home/base.html' %}
{% load static %}
{% block body %}

<div class="page-wrapper">
    <div class="content container-fluid">
    <div class="row">
        <div class="col-sm-6">
            <div class="card">
                <div class="card-header"><h5>Edit Department</h5></div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" name="name" class="form-control" value="{{ department.name }}" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea name="description" class="form-control" rows="3">{{ department.description }}</textarea>
                        </div>
                        <div class="form-group">
                            <label>Head Teacher</label>
                            <select name="head_teacher" class="form-control">
                                <option value="">Select Head Teacher</option>
                                {% for teacher in teachers %}
                                    <option value="{{ teacher.pk }}" {% if department.head_teacher and department.head_teacher.pk == teacher.pk %}selected{% endif %}>{{ teacher }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="{% url 'department_list' %}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</div>

<footer>
    <p>Copyright © 2026 PreSkool.</p>
</footer>

<script src="{% static 'assets/js/jquery-3.6.0.min.js' %}"></script>
<script src="{% static 'assets/js/popper.min.js' %}"></script>
<script src="{% static 'assets/plugins/bootstrap/js/bootstrap.min.js' %}"></script>
<script src="{% static 'assets/plugins/slimscroll/jquery.slimscroll.min.js' %}"></script>
<script src="{% static 'assets/js/script.js' %}"></script>
</body>
</html>
{% endblock %}
